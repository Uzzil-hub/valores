<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valores MKT - Premium v32</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { brand: { orange: '#FF6B00', dark: '#0A0A0A', card: '#141414' } } } }
        };
        if (localStorage.getItem('mkt_theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        [contenteditable="true"]:focus { outline: 2px solid #FF6B00; border-radius: 4px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #FF6B00; border-radius: 10px; }
        .admin-only-flex { display: none; }
        .handle { cursor: grab; margin-right: 8px; opacity: 0.3; }
        input[type="checkbox"] { accent-color: #FF6B00; width: 20px; height: 20px; cursor: pointer; }
        
        /* Layout Fix */
        .sidebar-transition { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; z-index: 100; height: 100vh; visibility: hidden; pointer-events: none; }
            #sidebar.open { transform: translateX(0); visibility: visible; pointer-events: auto; }
        }
    </style>
</head>
<body class="bg-white dark:bg-brand-dark text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-gray-100 dark:bg-black">
        <div class="bg-white dark:bg-brand-card p-10 rounded-[40px] shadow-2xl border border-gray-200 dark:border-white/5 w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-brand-orange text-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
                <i class="fas fa-bolt text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-1 tracking-tighter uppercase text-black dark:text-white">Valores <span class="text-brand-orange">MKT</span></h2>
            <div class="relative mb-6 mt-6">
                <input type="password" id="passInput" onkeypress="handleEnter(event, checkPass)" class="w-full p-5 pr-14 rounded-2xl border-2 border-gray-200 dark:border-white/10 bg-white dark:bg-black/30 outline-none focus:border-brand-orange text-center font-black tracking-widest uppercase text-black dark:text-white" placeholder="CÓDIGO" autofocus>
                <button onclick="togglePassVisibility()" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand-orange"><i id="eyeIcon" class="fas fa-eye"></i></button>
            </div>
            <button onclick="checkPass()" class="w-full bg-brand-orange hover:bg-orange-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 uppercase text-sm tracking-widest transition-all">Entrar</button>
            <p id="errorMsg" class="text-rose-500 text-xs mt-4 font-bold hidden italic">Código Incorreto</p>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col md:flex-row overflow-hidden">
        
        <button onclick="toggleMobileSidebar()" class="md:hidden fixed top-6 right-6 z-[150] w-14 h-14 bg-brand-orange text-white rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition-transform">
            <i class="fas fa-bars text-xl"></i>
        </button>

        <aside id="sidebar" class="sidebar-transition w-64 bg-gray-50 dark:bg-black border-r border-gray-200 dark:border-white/5 flex flex-col -translate-x-full md:translate-x-0">
            <div class="p-8 text-center">
                <h1 class="text-xl font-black tracking-tighter uppercase text-gray-900 dark:text-white">Valores <span class="text-brand-orange">MKT</span></h1>
                <span id="userStatus" class="text-[9px] font-black px-4 py-1.5 rounded-full mt-4 inline-block tracking-widest uppercase shadow-md"></span>
            </div>
            
            <nav class="px-6 flex-1 space-y-6 overflow-y-auto mt-4">
                <div id="adminMenu" class="admin-only-flex flex-col gap-3">
                    <button onclick="addRow()" class="w-full flex items-center justify-between p-4 bg-brand-orange text-white font-black rounded-2xl shadow-lg text-[10px] uppercase">Nova Loja <i class="fas fa-plus"></i></button>
                    <button onclick="inputRevenue()" class="w-full flex items-center justify-between p-4 bg-white dark:bg-brand-card text-gray-900 dark:text-white font-black rounded-2xl border border-gray-200 dark:border-white/10 text-[10px] uppercase">Lançar Venda <i class="fas fa-dollar-sign text-brand-orange"></i></button>
                </div>
                <div class="space-y-2">
                    <p class="text-[9px] font-black text-gray-400 uppercase px-2 tracking-widest">Opções</p>
                    <button onclick="exportCSV()" class="w-full text-left text-[10px] font-black p-4 hover:bg-brand-orange hover:text-white rounded-2xl transition-all uppercase">Exportar CSV</button>
                    <button onclick="exportPDF()" class="w-full text-left text-[10px] font-black p-4 hover:bg-brand-orange hover:text-white rounded-2xl transition-all uppercase">Exportar PDF</button>
                </div>
            </nav>

            <div class="p-6 border-t dark:border-white/5 space-y-3 text-center">
                <button onclick="toggleTheme()" class="w-full py-3 bg-gray-200 dark:bg-brand-card rounded-xl text-[9px] font-black uppercase">Mudar Tema</button>
                <button onclick="logout()" class="text-[9px] font-black text-gray-400 hover:text-brand-orange uppercase italic tracking-widest">Sair do Painel</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 bg-white dark:bg-brand-dark overflow-y-auto overflow-x-hidden">
            <main class="p-4 md:p-10">
                <div class="mb-10">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 mb-6 italic border-l-4 border-brand-orange pl-4">Faturamento Comercial</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-gray-200 dark:border-white/5 shadow-sm text-center">
                            <p class="text-[9px] font-black text-brand-orange uppercase mb-1 tracking-widest">Acumulado Mensal</p>
                            <h3 id="revTotal" class="text-3xl font-black tracking-tighter">R$ 0,00</h3>
                        </div>
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-gray-200 dark:border-white/5 shadow-sm text-center opacity-70">
                            <p class="text-[9px] font-black uppercase mb-1 tracking-widest text-gray-400">Média Diária</p>
                            <h3 id="revAvg" class="text-3xl font-black tracking-tighter text-gray-500">R$ 0,00</h3>
                        </div>
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-brand-orange/20 bg-brand-orange/5 shadow-sm text-center">
                            <p class="text-[9px] font-black text-brand-orange uppercase mb-1 tracking-widest">Projeção Final</p>
                            <h3 id="revProj" class="text-3xl font-black tracking-tighter text-brand-orange">R$ 0,00</h3>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-brand-card rounded-[30px] border border-gray-200 dark:border-white/5 overflow-hidden">
                        <div class="px-6 py-4 border-b dark:border-white/5 flex justify-between items-center bg-white/20 dark:bg-black/20">
                            <span class="text-[9px] font-black uppercase text-gray-400 tracking-widest">Histórico Mensal</span>
                            <button id="adminClearRev" onclick="clearAllRevenue()" class="hidden text-[9px] font-black text-rose-500 uppercase">Zerar Tudo</button>
                        </div>
                        <div class="max-h-48 overflow-y-auto px-2">
                            <table class="w-full text-[11px]"><tbody id="revenueTableBody" class="divide-y dark:divide-white/5"></tbody></table>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[30px] mb-8 border border-gray-200 dark:border-white/5 flex items-center justify-between px-8">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Quantidade de contas:</p>
                    <h3 id="dashTotal" class="text-3xl font-black text-brand-orange">0</h3>
                </div>

                <div id="adminBulkArea" class="hidden bg-brand-orange p-1 rounded-[35px] mb-8 shadow-xl">
                    <div class="bg-white dark:bg-brand-card rounded-[34px] p-6 grid grid-cols-1 lg:grid-cols-5 gap-4">
                        <div class="text-[10px] font-black text-brand-orange uppercase text-center py-2 italic underline underline-offset-4">Alteração em massa</div>
                        <select id="bulkCategory" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border-none text-xs font-bold outline-none"><option value="all">Todas Categorias</option><option value="0">Unissex</option><option value="1">Regata</option><option value="2">Infantil</option><option value="3">Plus Size</option><option value="4">M. Careca</option><option value="5">M. Canguru</option></select>
                        <select id="bulkMode" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border-none text-xs font-bold outline-none text-brand-orange"><option value="val">Preço Final</option><option value="cheio">Valor Cheio</option><option value="perc">Desconto (%)</option></select>
                        <input type="number" id="bulkValue" step="0.01" onkeypress="handleEnter(event, applyBulkUpdate)" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border-none text-xs font-bold outline-none" placeholder="VALOR">
                        <button onclick="applyBulkUpdate()" class="bg-brand-orange text-white font-black rounded-2xl uppercase text-[10px] py-4">Aplicar</button>
                    </div>
                </div>

                <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4">
                    <div class="flex flex-wrap gap-2 justify-center">
                        <button onclick="setFilter('')" class="px-4 py-2 bg-gray-100 dark:bg-brand-card rounded-xl text-[9px] font-black uppercase border border-transparent hover:border-brand-orange">Todos</button>
                        <button onclick="setFilter('ML')" class="px-4 py-2 bg-yellow-400 text-black rounded-xl text-[9px] font-black uppercase text-black">ML</button>
                        <button onclick="setFilter('Shopee')" class="px-4 py-2 bg-brand-orange text-white rounded-xl text-[9px] font-black uppercase text-white">Shopee</button>
                        <button onclick="setFilter('TikTok')" class="px-4 py-2 bg-black text-white dark:bg-white dark:text-black rounded-xl text-[9px] font-black uppercase">TikTok</button>
                        <button onclick="setFilter('Shein')" class="px-4 py-2 bg-gray-800 text-white rounded-xl text-[9px] font-black uppercase">Shein</button>
                    </div>
                    <div class="relative w-full lg:w-80">
                        <input type="text" id="globalSearch" oninput="render()" placeholder="BUSCAR CONTA..." class="w-full p-4 pl-12 rounded-2xl bg-gray-100 dark:bg-brand-card border-none text-xs font-bold outline-none focus:ring-2 ring-brand-orange uppercase">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-brand-card rounded-[35px] shadow-2xl border border-gray-200 dark:border-white/5 overflow-x-auto mb-20">
                    <table class="whitespace-nowrap text-left w-full border-collapse">
                        <thead class="bg-gray-50 dark:bg-black/50 text-[9px] font-black text-gray-400 uppercase tracking-widest border-b dark:border-white/5">
                            <tr id="tableHeadRow">
                                </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y dark:divide-white/5"></tbody>
                    </table>
                </div>

                <div id="historyBlock" class="hidden bg-black text-white p-8 rounded-[40px] border border-white/5 mb-32 font-mono">
                    <p class="text-[10px] font-black text-brand-orange mb-4 uppercase tracking-widest">Sistema Log</p>
                    <ul id="historyList" class="space-y-2 text-[10px] opacity-60"></ul>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfRR0V74GV6Tr9ZxiHUTiDGOg-4HqqHxE",
            authDomain: "valores-mkt.firebaseapp.com",
            databaseURL: "https://valores-mkt-default-rtdb.firebaseio.com", 
            projectId: "valores-mkt",
            storageBucket: "valores-mkt.firebasestorage.app",
            messagingSenderId: "981119124135",
            appId: "1:981119124135:web:f2cbcaf672e6e88991d182"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const PASSWORDS = { admin: "748596", viewer: "convidado" };
        let isAdmin = false, accounts = [], historyData = [], selectedIndices = new Set(), revenueData = { daily: {}, total: 0 };
        const categories = ["Unissex", "Regata", "Infantil", "Plus Size", "M. Careca", "M. Canguru"];

        function handleEnter(e, cb) { if (e.key === "Enter") { e.preventDefault(); cb(); } }
        function togglePassVisibility() { const i = document.getElementById('passInput'); const icon = document.getElementById('eyeIcon'); i.type = i.type === "password" ? "text" : "password"; icon.className = i.type === "password" ? 'fas fa-eye' : 'fas fa-eye-slash'; }
        function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebar').classList.toggle('open'); }

        function checkPass() {
            const v = document.getElementById('passInput').value.trim();
            if (v === PASSWORDS.admin) { isAdmin = true; enterApp("ADMIN"); }
            else if (v === PASSWORDS.viewer) { isAdmin = false; enterApp("CONVIDADO"); }
            else { document.getElementById('errorMsg').classList.remove('hidden'); }
        }

        function enterApp(m) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            const status = document.getElementById('userStatus');
            status.innerText = m;
            if(isAdmin) {
                document.getElementById('adminMenu').style.display = 'flex';
                document.getElementById('adminBulkArea').classList.remove('hidden');
                document.getElementById('adminClearRev').classList.remove('hidden');
                document.getElementById('historyBlock').classList.remove('hidden');
                status.className = "text-[9px] font-black px-4 py-1.5 rounded-full mt-4 inline-block tracking-widest uppercase bg-brand-orange text-white shadow-lg";
            } else {
                status.className = "text-[9px] font-black px-4 py-1.5 rounded-full mt-4 inline-block tracking-widest uppercase bg-gray-200 dark:bg-brand-card text-gray-500";
            }
            startSync();
        }

        function startSync() {
            db.ref('accounts').on('value', snap => { if (snap.val()) { accounts = snap.val(); render(); } });
            db.ref('history').limitToLast(30).on('value', snap => { if (snap.val()) { historyData = Object.values(snap.val()).reverse(); renderHistory(); } });
            db.ref('revenue').on('value', snap => { if (snap.val()) { revenueData = snap.val(); updateRevenueDash(); } else { db.ref('revenue').set({ total: 0, daily: {} }); } });
        }

        function inputRevenue() {
            if(!isAdmin) return;
            const d = prompt("Data (DD/MM/AAAA):", new Date().toLocaleDateString());
            if(!d) return;
            const p = d.split('/'); if(p.length !== 3) return alert("Erro.");
            const v = parseFloat(prompt("Valor Vendido (R$):", "0")); if (isNaN(v)) return;
            const key = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
            if(!revenueData.daily) revenueData.daily = {};
            revenueData.daily[key] = v;
            let nt = 0; Object.values(revenueData.daily).forEach(x => nt += x);
            revenueData.total = nt; db.ref('revenue').set(revenueData);
        }

        function updateRevenueDash() {
            const totalVal = revenueData.total || 0;
            const qtd = revenueData.daily ? Object.keys(revenueData.daily).length : 0;
            const avg = qtd > 0 ? totalVal / qtd : 0;
            const d = new Date(); const days = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            const proj = avg * days;
            document.getElementById('revTotal').innerText = `R$ ${totalVal.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById('revAvg').innerText = `R$ ${avg.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById('revProj').innerText = `R$ ${proj.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            const tb = document.getElementById('revenueTableBody'); tb.innerHTML = '';
            if(revenueData.daily) {
                Object.keys(revenueData.daily).sort().reverse().forEach(k => {
                    const p = k.split('-');
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="px-8 py-4 font-bold text-gray-400 uppercase tracking-tighter">${p[2]}/${p[1]}/${p[0]}</td><td class="px-8 py-4 font-black text-brand-orange">R$ ${revenueData.daily[k].toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="px-8 py-4 text-right ${isAdmin ? '' : 'hidden'}"><button onclick="removeRevenueDay('${k}')" class="text-gray-400 hover:text-rose-500"><i class="fas fa-trash"></i></button></td>`;
                    tb.appendChild(tr);
                });
            }
        }

        function render() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const head = document.getElementById('tableHeadRow');
            const body = document.getElementById('tableBody');
            
            // Render Header
            let headHTML = isAdmin ? `<th class="px-6 py-6 text-center w-10"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this.checked)"></th>` : '';
            headHTML += `<th class="px-8 py-6 border-r dark:border-white/5">Canal / Conta</th>
                        <th class="px-8 py-6">Unissex</th><th class="px-8 py-6">Regata</th><th class="px-8 py-6">Infantil</th><th class="px-8 py-6">Plus</th><th class="px-8 py-6">Careca</th><th class="px-8 py-6">Canguru</th>`;
            if(isAdmin) headHTML += `<th class="px-8 py-6 text-center">Excluir</th>`;
            head.innerHTML = headHTML;

            body.innerHTML = '';
            accounts.forEach((acc, idx) => {
                if(q && !acc.n.toLowerCase().includes(q)) return;
                const tr = document.createElement('tr');
                tr.className = selectedIndices.has(idx) ? 'bg-brand-orange/5' : '';
                
                let row = isAdmin ? `<td class="px-6 py-8 text-center"><input type="checkbox" onclick="toggleSelect(${idx})" ${selectedIndices.has(idx)?'checked':''}></td>` : '';
                row += `<td class="px-8 py-8 font-black border-r dark:border-white/5"><div class="flex items-center">${isAdmin?'<i class="fas fa-grip-vertical handle"></i>':''}${getIcon(acc.n)} <span ${isAdmin?'contenteditable="true" onblur="upName('+idx+', this.innerText)"':''}>${acc.n}</span></div></td>`;
                
                acc.v.forEach((v, vi) => {
                    let dV = v; if (acc.t === 2 && acc.c[vi] > 0) dV = acc.c[vi] * (1 - (acc.p[vi] / 100));
                    const is0 = dV <= 0;
                    row += `<td class="px-8 py-8 font-mono"><div class="flex flex-col gap-1.5">
                        ${acc.t===2 && acc.c[vi]>0?`<div class="flex flex-col"><span class="text-[7px] text-gray-500 font-black uppercase tracking-widest">Valor cheio</span><span class="text-[9px] text-gray-400 font-bold" ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'cheio\')\"':''}>R$ ${acc.c[vi].toFixed(2)}</span></div>`:''}
                        <div class="flex flex-col"><span class="text-[7px] text-brand-orange font-black uppercase tracking-widest">${acc.t===2?'Valor final':'Valor'}</span><span class="${is0?'text-gray-300':'font-black text-sm text-gray-900 dark:text-white'}" ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'val\')\"':''}>${is0?'-':'R$ '+dV.toFixed(2)}</span></div>
                        ${acc.t===2 && !is0?`<div class="flex flex-col"><span class="text-[7px] text-gray-400 font-black uppercase tracking-widest">% off</span><span class="text-[9px] font-black text-brand-orange" ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'perc\')\"':''}>${acc.p[vi].toFixed(1)}%</span></div>`:''}
                    </div></td>`;
                });
                
                if(isAdmin) row += `<td class="px-8 py-8 text-center"><button onclick="removeRow(${idx})" class="text-gray-400 hover:text-rose-500"><i class="fas fa-trash text-lg"></i></button></td>`;
                tr.innerHTML = row; body.appendChild(tr);
            });
            if(isAdmin) initSortable();
            document.getElementById('dashTotal').innerText = accounts.filter(a => !q || a.n.toLowerCase().includes(q)).length;
        }

        function hSync(idx, col, input, m) {
            if(!isAdmin) return;
            let n = parseFloat(input.replace(/[^\d.,-]/g, '').replace(',', '.')); if (isNaN(n)) return render();
            let a = accounts[idx];
            if (m === 'val') { a.v[col] = n; if(a.t === 2 && a.c[col]>0) a.p[col] = (1-(n/a.c[col]))*100; }
            else if (m === 'perc') { a.p[col] = n; if(a.t === 2 && a.c[col]>0) a.v[col] = a.c[col]*(1-(n/100)); }
            else if (m === 'cheio') { a.c[col] = n; a.v[col] = n*(1-(a.p[col]/100)); }
            db.ref('accounts').set(accounts);
        }

        function applyBulkUpdate() {
            if(!isAdmin) return;
            const cat = document.getElementById('bulkCategory').value, mode = document.getElementById('bulkMode').value, val = parseFloat(document.getElementById('bulkValue').value);
            if (isNaN(val)) return;
            if (selectedIndices.size === 0) { const q = document.getElementById('globalSearch').value.toLowerCase(); accounts.forEach((a, i) => { if (!q || a.n.toLowerCase().includes(q)) selectedIndices.add(i); }); }
            selectedIndices.forEach(idx => {
                let a = accounts[idx];
                const up = (i) => {
                    if (mode === 'val') { a.v[i] = val; if(a.t===2 && a.c[i]>0) a.p[i] = (1-(val/a.c[i]))*100; }
                    else if (mode === 'cheio' && a.t===2) { a.c[i] = val; a.v[i] = val*(1-(a.p[i]/100)); }
                    else if (mode === 'perc' && a.t===2) { a.p[i] = val; a.v[i] = a.c[i]*(1-(val/100)); }
                };
                if (cat === 'all') a.v.forEach((_, i) => up(i)); else up(parseInt(cat));
            });
            selectedIndices.clear(); db.ref('accounts').set(accounts);
        }

        function renderHistory() { document.getElementById('historyList').innerHTML = historyData.map(h => `<li class="border-b border-white/5 pb-1 opacity-50">> ${h}</li>`).join(''); }
        function toggleSelect(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
        function toggleSelectAll(c) { selectedIndices.clear(); if(c) { const q = document.getElementById('globalSearch').value.toLowerCase(); accounts.forEach((a,i) => { if(!q || a.n.toLowerCase().includes(q)) selectedIndices.add(i); }); } render(); }
        function toggleTheme() { const d = document.documentElement; d.classList.toggle('dark'); localStorage.setItem('mkt_theme', d.classList.contains('dark') ? 'dark' : 'light'); }
        function logout() { sessionStorage.removeItem('mkt_auth'); location.reload(); }
        function upName(i, t) { accounts[i].n = t.trim(); db.ref('accounts').set(accounts); }
        function setFilter(v) { document.getElementById('globalSearch').value = v; render(); }
        function initSortable() { if(!isAdmin) return; new Sortable(document.getElementById('tableBody'), { handle: '.handle', onEnd: (evt) => { const m = accounts.splice(evt.oldIndex, 1)[0]; accounts.splice(evt.newIndex, 0, m); db.ref('accounts').set(accounts); } }); }
        function removeRow(i) { if(isAdmin && confirm("Excluir conta?")) { accounts.splice(i, 1); db.ref('accounts').set(accounts); } }
        function addRow() { if(!isAdmin) return; const t = prompt("Tipo (1 ou 2):", "1"); if(!t) return; accounts.unshift({n:"NOVA_LOJA", t:parseInt(t), c:[60,60,60,60,80,80], p:[40,40,40,40,0,0], v:[0,0,0,0,0,0]}); db.ref('accounts').set(accounts); }
        function clearHistory() { if(isAdmin && confirm("Limpar histórico?")) db.ref('history').remove(); }
        function removeRevenueDay(k) { if(isAdmin && confirm("Excluir dia?")) { delete revenueData.daily[k]; let nt = 0; Object.values(revenueData.daily).forEach(x => nt += x); revenueData.total = nt; db.ref('revenue').set(revenueData); } }
        function clearAllRevenue() { if(isAdmin && confirm("Zerar mês?")) { revenueData = { total: 0, daily: {} }; db.ref('revenue').set(revenueData); } }

        function getIcon(n) { 
            const s = n.toLowerCase(); 
            if(s.includes('ml')) return '<i class="fas fa-handshake text-yellow-400 mr-3 text-lg"></i>'; 
            if(s.includes('shopee')) return '<i class="fas fa-shopping-bag text-brand-orange mr-3 text-lg"></i>'; 
            if(s.includes('tiktok')) return '<i class="fab fa-tiktok dark:text-white text-black mr-3 text-lg"></i>'; 
            if(s.includes('shein')) return '<i class="fas fa-shopping-cart text-gray-500 mr-3 text-lg"></i>'; 
            return '<i class="fas fa-store opacity-20 mr-3"></i>'; 
        }

        function exportCSV() { 
            const q = document.getElementById('globalSearch').value.toLowerCase();
            let csv = "Loja,Unissex,Regata,Infantil,Plus,Careca,Canguru\n"; 
            accounts.filter(a => !q || a.n.toLowerCase().includes(q)).forEach(a => { csv += `${a.n},${a.v.map(v => v.toFixed(2)).join(",")}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); 
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Relatorio.csv`; link.click(); 
        }
        function exportPDF() { 
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.text("Relatorio Cloud MKT", 14, 15); 
            const filtered = accounts.filter(a => !q || a.n.toLowerCase().includes(q));
            doc.autoTable({ head: [['Conta', ...categories]], body: filtered.map(a => [a.n, ...a.v.map(v => v > 0 ? `R$ ${v.toFixed(2)}` : '-')]), startY: 20, styles: { fontSize: 8 } }); 
            doc.save('Relatorio.pdf'); 
        }
        if (sessionStorage.getItem('mkt_auth') === 'true') { isAdmin = true; enterApp("ADMIN"); }
    </script>
</body>
</html>
