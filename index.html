<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valores MKT - Cloud System v14</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('mkt_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        [contenteditable="true"]:focus { outline: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .handle { cursor: grab; padding: 0 10px; color: #cbd5e1; }
        input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
        #lockScreen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; }
        .dark #lockScreen { background-color: #020617; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 font-sans transition-colors overflow-hidden">

    <div id="lockScreen">
        <div class="bg-white dark:bg-gray-900 p-8 rounded-3xl shadow-2xl border dark:border-gray-800 w-full max-sm:mx-4 max-w-sm text-center">
            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h2 class="text-xl font-black mb-2 text-blue-600 tracking-tighter">Valores MKT Cloud</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6 font-medium uppercase tracking-widest">Código de Acesso</p>
            
            <div class="relative mb-4">
                <input type="password" id="passInput" class="w-full p-4 pr-12 rounded-2xl border dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 ring-blue-500 text-center font-bold tracking-widest uppercase" placeholder="••••••••">
                <button onclick="togglePassVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500 transition-colors">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>
            
            <button onclick="checkPass()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">Entrar no Painel</button>
            <p id="errorMsg" class="text-rose-500 text-xs mt-4 font-bold hidden italic">Código inválido! Tente novamente.</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <button onclick="toggleSidebar()" class="md:hidden fixed top-4 left-4 z-50 bg-blue-600 text-white p-3 rounded-xl shadow-lg">
            <i class="fas fa-bars"></i>
        </button>

        <div class="flex h-screen">
            <aside id="sidebar" class="fixed md:relative z-40 -translate-x-full md:translate-x-0 transition-transform duration-300 w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col">
                <div class="p-6 text-center border-b dark:border-gray-800">
                    <h1 class="text-xl font-black text-blue-600 dark:text-blue-500 uppercase tracking-tighter">Valores MKT</h1>
                    <span id="userStatus" class="text-[9px] font-black px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 mt-2 inline-block tracking-widest italic uppercase">CONVIDADO</span>
                </div>
                <nav class="p-4 flex-1 space-y-4 overflow-y-auto">
                    <button id="adminBtnAdd" onclick="addRow()" class="hidden w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 text-sm uppercase">
                        <i class="fas fa-plus-circle"></i> Nova Conta
                    </button>
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-gray-400 uppercase px-2 mb-2 italic">Relatórios Online</p>
                        <button onclick="exportCSV()" class="w-full text-left text-[11px] font-bold p-3 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors"><i class="fas fa-file-csv mr-3 text-emerald-500"></i> Exportar CSV</button>
                        <button onclick="exportPDF()" class="w-full text-left text-[11px] font-bold p-3 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors"><i class="fas fa-file-pdf mr-3 text-rose-500"></i> Gerar PDF</button>
                    </div>
                </nav>
                <div class="p-4 border-t dark:border-gray-800 flex flex-col gap-2 text-center">
                    <button onclick="toggleTheme()" class="w-full py-2 bg-gray-100 dark:bg-gray-800 rounded-xl text-[10px] font-black uppercase tracking-widest">Alternar Tema</button>
                    <button id="adminBtnReset" onclick="forceReset()" class="hidden text-[9px] font-bold text-gray-400 hover:text-rose-500 uppercase">Restaurar Original</button>
                    <button onclick="logout()" class="text-[9px] font-bold text-gray-400 hover:text-blue-500 uppercase mt-2 italic tracking-widest">Sair do Painel</button>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white dark:bg-gray-900 p-6 rounded-3xl border shadow-sm text-center">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-1 italic tracking-widest">Contas</p>
                        <h3 id="dashTotal" class="text-3xl font-black">0</h3>
                    </div>
                    <div class="bg-white dark:bg-gray-900 p-6 rounded-3xl border shadow-sm text-center border-b-4 border-b-blue-500">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-1 italic tracking-widest">Ticket Médio</p>
                        <h3 id="dashTicket" class="text-3xl font-black text-blue-600">R$ 0,00</h3>
                    </div>
                    <div class="bg-white dark:bg-gray-900 p-6 rounded-3xl border shadow-sm text-center border-b-4 border-b-emerald-500">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-1 italic tracking-widest">Menor Valor Final</p>
                        <h3 id="dashMin" class="text-3xl font-black text-emerald-600">R$ 0,00</h3>
                        <p id="dashMinMeta" class="text-[9px] font-bold text-gray-500 uppercase mt-1">-</p>
                    </div>
                </div>

                <div id="adminBulkArea" class="hidden bg-white dark:bg-gray-900 p-6 rounded-3xl border mb-8 shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                        <div class="p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border text-[10px] font-bold flex items-center justify-center text-blue-600 uppercase italic">Ação p/ Marcados</div>
                        <select id="bulkCategory" class="p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border text-xs font-bold outline-none font-sans">
                            <option value="all">Categorias</option>
                            <option value="0">Unissex</option><option value="1">Regata</option><option value="2">Infantil</option><option value="3">Plus Size</option><option value="4">M. Careca</option><option value="5">M. Canguru</option>
                        </select>
                        <select id="bulkMode" class="p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border text-xs font-bold outline-none text-blue-600">
                            <option value="val">Preço Final (R$)</option>
                            <option value="cheio">Valor Cheio (R$)</option>
                            <option value="perc">Desconto (%)</option>
                        </select>
                        <input type="number" id="bulkValue" step="0.01" class="p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border text-xs font-bold outline-none" placeholder="Valor">
                        <button onclick="applyBulkUpdate()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs uppercase shadow-md transition-all active:scale-95 tracking-widest">Aplicar</button>
                    </div>
                </div>

                <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 font-sans">
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setFilter('')" class="px-4 py-2 bg-gray-200 dark:bg-gray-800 rounded-xl text-[10px] font-bold uppercase">Todos</button>
                        <button onclick="setFilter('ML')" class="px-4 py-2 bg-yellow-400 text-black rounded-xl text-[10px] font-bold uppercase">ML</button>
                        <button onclick="setFilter('Shopee')" class="px-4 py-2 bg-orange-600 text-white rounded-xl text-[10px] font-bold uppercase">Shopee</button>
                        <button onclick="setFilter('TikTok')" class="px-4 py-2 bg-cyan-500 text-white rounded-xl text-[10px] font-bold uppercase">TikTok</button>
                        <button onclick="setFilter('Shein')" class="px-4 py-2 bg-black text-white rounded-xl text-[10px] font-bold uppercase">Shein</button>
                    </div>
                    <input type="text" id="globalSearch" oninput="render()" placeholder="BUSCAR LOJA..." class="w-full lg:w-64 p-3 rounded-2xl bg-white dark:bg-gray-900 border text-sm outline-none font-medium uppercase tracking-tighter">
                </div>

                <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-xl border overflow-hidden mb-8">
                    <div class="overflow-x-auto touch-pan-x">
                        <table class="w-full text-left whitespace-nowrap">
                            <thead class="bg-gray-50 dark:bg-gray-800 text-[10px] font-black text-gray-400 uppercase tracking-tighter border-b">
                                <tr id="tableHead">
                                    <th id="thSelect" class="px-4 py-5 text-center hidden"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this.checked)"></th>
                                    <th class="px-6 py-5 border-r dark:border-gray-700">Canal / Conta</th>
                                    <th class="px-6 py-5">Unissex</th><th class="px-6 py-5">Regata</th><th class="px-6 py-5">Infantil</th><th class="px-6 py-5">Plus Size</th><th class="px-6 py-5">M. Careca</th><th class="px-6 py-5">M. Canguru</th>
                                    <th id="thActions" class="px-6 py-5 text-center hidden uppercase">Excluir</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y dark:divide-gray-800"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-900 rounded-3xl border shadow-sm overflow-hidden mb-12">
                    <div class="p-4 border-b dark:border-gray-800 flex justify-between items-center">
                        <h4 class="text-[10px] font-black uppercase tracking-widest text-gray-500 italic">Histórico de Atividade Nuvem</h4>
                        <button id="adminBtnClearHistory" onclick="clearHistory()" class="hidden text-[9px] font-black text-rose-500 uppercase tracking-widest">Limpar Histórico</button>
                    </div>
                    <div id="historyContent" class="p-4 max-h-40 overflow-y-auto"><ul id="historyList" class="space-y-2 text-[11px] font-sans"></ul></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAfRR0V74GV6Tr9ZxiHUTiDGOg-4HqqHxE",
            authDomain: "valores-mkt.firebaseapp.com",
            databaseURL: "https://valores-mkt-default-rtdb.firebaseio.com", 
            projectId: "valores-mkt",
            storageBucket: "valores-mkt.firebasestorage.app",
            messagingSenderId: "981119124135",
            appId: "1:981119124135:web:f2cbcaf672e6e88991d182"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- SENHAS ---
        const PASSWORDS = { 
            admin: "748596",      
            viewer: "convidado"   
        };

        let isAdmin = false, accounts = [], historyData = [], selectedIndices = new Set();
        const categories = ["Unissex", "Regata", "Infantil", "Plus Size", "M. Careca", "M. Canguru"];

        // Função de Visibilidade da Senha
        function togglePassVisibility() {
            const input = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkPass() {
            const val = document.getElementById('passInput').value.trim();
            if (val === PASSWORDS.admin) { isAdmin = true; enterApp("Admin"); }
            else if (val === PASSWORDS.viewer) { isAdmin = false; enterApp("Consulta"); }
            else { document.getElementById('errorMsg').classList.remove('hidden'); }
        }

        function enterApp(mode) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userStatus').innerText = mode.toUpperCase();
            
            if(isAdmin) {
                document.getElementById('adminBtnAdd').classList.remove('hidden');
                document.getElementById('adminBtnReset').classList.remove('hidden');
                document.getElementById('adminBtnClearHistory').classList.remove('hidden');
                document.getElementById('adminBulkArea').classList.remove('hidden');
                document.getElementById('thSelect').classList.remove('hidden');
                document.getElementById('thActions').classList.remove('hidden');
                document.getElementById('userStatus').classList.add('bg-blue-100', 'text-blue-600', 'italic');
            }
            startSync();
        }

        function startSync() {
            db.ref('accounts').on('value', snap => {
                const d = snap.val();
                if (d) { accounts = d; render(); }
            });
            db.ref('history').limitToLast(20).on('value', snap => {
                const d = snap.val();
                if (d) { historyData = Object.values(d).reverse(); renderHistory(); }
            });
        }

        function save() { if(isAdmin) db.ref('accounts').set(accounts); }
        function logCloud(m) { if(isAdmin) db.ref('history').push(`[${new Date().toLocaleTimeString()}] ${m}`); }

        function handleSync(idx, col, input, mode) {
            if(!isAdmin) return;
            let n = parseFloat(input.replace(/[^\d.,-]/g, '').replace(',', '.'));
            if (isNaN(n)) return render();
            let a = accounts[idx];
            if (mode === 'val') { a.v[col] = n; if(a.t === 2 && a.c[col]>0) a.p[col] = (1-(n/a.c[col]))*100; }
            else if (mode === 'perc') { a.p[col] = n; if(a.t === 2 && a.c[col]>0) a.v[col] = a.c[col]*(1-(n/100)); }
            else if (mode === 'cheio') { a.c[col] = n; a.v[col] = n*(1-(a.p[col]/100)); }
            logCloud(`Edit: ${a.n} (${categories[col]})`); save();
        }

        function render() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            
            accounts.forEach((acc, idx) => {
                if(q && !acc.n.toLowerCase().includes(q)) return;
                const isC = selectedIndices.has(idx);
                const tr = document.createElement('tr');
                tr.className = isC ? 'bg-blue-50/50 dark:bg-blue-900/20' : '';
                
                let row = `<td class="px-4 py-5 text-center ${isAdmin ? '' : 'hidden'}">
                        <input type="checkbox" ${isC ? 'checked' : ''} onclick="toggleSelect(${idx})">
                    </td>
                    <td class="px-6 py-4 font-bold border-r dark:border-gray-800">
                        <div class="flex items-center">
                            ${isAdmin ? '<i class="fas fa-grip-vertical handle mr-2 text-gray-300"></i>' : ''}
                            ${getIcon(acc.n)} <span ${isAdmin ? 'contenteditable="true" onblur="upName('+idx+', this.innerText)"' : ''}>${acc.n}</span>
                        </div>
                    </td>`;

                acc.v.forEach((val, vi) => {
                    let displayVal = val;
                    if (acc.t === 2 && acc.c[vi] > 0) {
                        displayVal = acc.c[vi] * (1 - (acc.p[vi] / 100));
                        acc.v[vi] = displayVal;
                    }
                    const isZero = displayVal <= 0;
                    row += `<td class="px-6 py-4 font-sans"><div class="flex flex-col gap-0.5">
                        ${acc.t===2 && acc.c[vi]>0?`<div class="flex flex-col"><span class="text-[7px] text-gray-400 font-black uppercase">Cheio</span><span class="text-[9px] text-gray-500 font-bold" ${isAdmin?'contenteditable="true" onblur="handleSync('+idx+','+vi+',this.innerText,\'cheio\')\"':''}>R$ ${acc.c[vi].toFixed(2)}</span></div>`:''}
                        <div class="flex flex-col"><span class="text-[7px] text-blue-400 font-black uppercase tracking-tighter">${acc.t===2?'Final':'Valor'}</span><span class="${isZero?'text-gray-300':'text-blue-600 font-black text-sm'}" ${isAdmin?'contenteditable="true" onblur="handleSync('+idx+','+vi+',this.innerText,\'val\')\"':''}>${isZero?'-':'R$ '+displayVal.toFixed(2)}</span></div>
                        ${acc.t===2 && !isZero?`<div class="flex flex-col"><span class="text-[7px] text-orange-400 font-black uppercase">OFF</span><span class="text-[9px] font-black text-orange-500" ${isAdmin?'contenteditable="true" onblur="handleSync('+idx+','+vi+',this.innerText,\'perc\')\"':''}>${acc.p[vi].toFixed(1)}%</span></div>`:''}
                    </div></td>`;
                });
                
                row += `<td class="px-6 py-4 text-center ${isAdmin ? '' : 'hidden'}">
                    <button onclick="removeRow(${idx})" class="text-gray-300 hover:text-rose-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                </td>`;
                tr.innerHTML = row; body.appendChild(tr);
            });
            if(isAdmin) initSortable();
            updateDash();
        }

        function applyBulkUpdate() {
            if(!isAdmin) return;
            const cat = document.getElementById('bulkCategory').value, mode = document.getElementById('bulkMode').value, val = parseFloat(document.getElementById('bulkValue').value);
            if (isNaN(val)) return;
            if (selectedIndices.size === 0) { const q = document.getElementById('globalSearch').value.toLowerCase(); accounts.forEach((a, i) => { if (!q || a.n.toLowerCase().includes(q)) selectedIndices.add(i); }); }
            selectedIndices.forEach(idx => {
                let a = accounts[idx];
                const update = (i) => {
                    if (mode === 'val') { a.v[i] = val; if(a.t===2 && a.c[i]>0) a.p[i] = (1-(val/a.c[i]))*100; }
                    else if (mode === 'cheio' && a.t===2) { a.c[i] = val; a.v[i] = val*(1-(a.p[i]/100)); }
                    else if (mode === 'perc' && a.t===2) { a.p[i] = val; a.v[i] = a.c[i]*(1-(val/100)); }
                };
                if (cat === 'all') a.v.forEach((_, i) => update(i)); else update(parseInt(cat));
            });
            logCloud("Massa aplicada."); selectedIndices.clear(); save();
        }

        function removeRow(i) { if(isAdmin && confirm("Excluir conta definitivamente?")) { logCloud(`Excluída: ${accounts[i].n}`); accounts.splice(i, 1); save(); } }
        function addRow() { if(!isAdmin) return; const t = prompt("Tipo: 1-Direto / 2-Desconto", "1"); if(!t) return; accounts.unshift({n:"Nova Loja", t:parseInt(t), c:[60,60,60,60,80,80], p:[40,40,40,40,0,0], v:[0,0,0,0,0,0]}); save(); }
        function forceReset() { if(isAdmin && confirm("Restaurar original?")) location.reload(); }
        function clearHistory() { if(isAdmin && confirm("Limpar histórico?")) db.ref('history').remove(); }
        function getIcon(n) { const s = n.toLowerCase(); if(s.includes('ml')) return '<i class="fas fa-handshake text-yellow-500 mr-2"></i>'; if(s.includes('shopee')) return '<i class="fas fa-shopping-bag text-orange-600 mr-2"></i>'; if(s.includes('tiktok')) return '<i class="fab fa-tiktok text-cyan-500 mr-2"></i>'; if(s.includes('shein')) return '<i class="fas fa-shopping-cart text-gray-900 dark:text-white mr-2"></i>'; return '<i class="fas fa-store text-gray-400 mr-2"></i>'; }
        function updateDash() {
            let total = 0, soma = 0, min = Infinity, minN = "";
            accounts.forEach(acc => acc.v.forEach((v, i) => { if(v > 0) { total++; soma += v; if(v < min) { min = v; minN = `${acc.n} (${categories[i]})`; } } }));
            document.getElementById('dashTotal').innerText = accounts.length; 
            document.getElementById('dashTicket').innerText = total > 0 ? `R$ ${(soma/total).toFixed(2)}` : "R$ 0,00";
            document.getElementById('dashMin').innerText = min === Infinity ? "R$ 0,00" : `R$ ${min.toFixed(2)}`; 
            document.getElementById('dashMinMeta').innerText = minN || "-";
        }
        function renderHistory() { document.getElementById('historyList').innerHTML = historyData.map(h => `<li class="border-b dark:border-gray-800 pb-1 font-medium italic text-gray-500 text-[10px]">${h}</li>`).join(''); }
        function toggleSelect(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
        function toggleSelectAll(c) { selectedIndices.clear(); if(c) { const q = document.getElementById('globalSearch').value.toLowerCase(); accounts.forEach((a,i) => { if(!q || a.n.toLowerCase().includes(q)) selectedIndices.add(i); }); } render(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function logout() { sessionStorage.removeItem('mkt_auth'); location.reload(); }
        function upName(i, t) { accounts[i].n = t.trim(); save(); }
        function setFilter(v) { document.getElementById('globalSearch').value = v; render(); }
        function initSortable() { if(!isAdmin) return; new Sortable(document.getElementById('tableBody'), { handle: '.handle', onEnd: (evt) => { const m = accounts.splice(evt.oldIndex, 1)[0]; accounts.splice(evt.newIndex, 0, m); save(); } }); }
        
        function exportCSV() { 
            let csv = "Loja,Unissex,Regata,Infantil,Plus,Careca,Canguru\n"; 
            accounts.forEach(a => csv += `${a.n},${a.v.map(v => v.toFixed(2)).join(",")}\n`); 
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); 
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Relatorio.csv"; link.click(); 
        }
        function exportPDF() { 
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.text("Relatorio Cloud MKT", 14, 15); 
            doc.autoTable({ head: [['Conta', ...categories]], body: accounts.map(a => [a.n, ...a.v.map(v => v > 0 ? `R$ ${v.toFixed(2)}` : '-')]), startY: 20, styles: { fontSize: 7 } }); 
            doc.save('Relatorio.pdf'); 
        }

        if (sessionStorage.getItem('mkt_auth') === 'true') { isAdmin = true; enterApp("Admin"); }
    </script>
</body>
</html>
