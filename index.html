<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valores MKT - Premium v80</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { brand: { orange: '#FF6B00', dark: '#0A0A0A', card: '#141414' } } } }
        };
        if (localStorage.getItem('mkt_theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        [contenteditable="true"]:focus { outline: 2px solid #FF6B00; border-radius: 4px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #FF6B00; border-radius: 10px; }
        .admin-only { display: none; }
        .handle { cursor: grab; margin-right: 8px; opacity: 0.3; }
        input[type="checkbox"] { accent-color: #FF6B00; width: 22px; height: 22px; cursor: pointer; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(2px); }
        @media (max-width: 768px) {
            #sidebar { position: fixed; z-index: 100; height: 100vh; width: 280px; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
            #sidebar:not(.open) { transform: translateX(-100%); }
            #sidebar.open ~ #sidebarOverlay { display: block; }

        .progress-glow { box-shadow: 0 0 25px rgba(255, 107, 0, 0.4); }
        .goal-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; }
        .goal-card.active-filter { border-color: #FF6B00 !important; transform: translateY(-4px); }
        select { cursor: pointer; }
    </style>
</head>
<body class="bg-white dark:bg-brand-dark text-gray-900 dark:text-gray-100 min-h-screen">

                <input type="password" id="passInput" onkeypress="if(event.key==='Enter') checkPass()" class="w-full p-4 md:p-5 pr-12 md:pr-14 rounded-2xl border-2 border-gray-200 dark:border-white/10 bg-white dark:bg-black/30 outline-none focus:border-brand-orange text-center font-black tracking-widest uppercase text-black dark:text-white" placeholder="CÓDIGO">

            <button onclick="checkPass()" class="w-full bg-brand-orange hover:bg-orange-600 text-white font-black py-4 md:py-5 rounded-2xl shadow-xl active:scale-95 uppercase text-sm tracking-widest transition-all">Entrar</button>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col md:flex-row overflow-hidden text-black dark:text-white">
        <button onclick="toggleSidebar()" class="md:hidden fixed top-4 right-4 z-[150] w-12 h-12 bg-brand-orange text-white rounded-xl shadow-lg flex items-center justify-center active:scale-90"><i class="fas fa-bars text-lg"></i></button>
        <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="sidebar-transition bg-gray-50 dark:bg-black border-r border-gray-200 dark:border-white/5 flex flex-col">
            <div class="p-8 text-center border-b dark:border-white/5">
                <h1 class="text-xl font-black tracking-tighter uppercase">Valores <span class="text-brand-orange">MKT</span></h1>

            <nav class="px-6 flex-1 space-y-6 overflow-y-auto mt-4 text-black dark:text-white">
                <div id="adminMenu" class="admin-only space-y-3">
                    <button onclick="addRow()" class="w-full flex items-center justify-between p-4 bg-brand-orange text-white font-black rounded-2xl shadow-lg text-[10px] uppercase">Nova Loja <i class="fas fa-plus"></i></button>
                    <button onclick="inputRevenue()" class="w-full flex items-center justify-between p-4 bg-white dark:bg-brand-card text-gray-900 dark:text-white font-black rounded-2xl border border-gray-200 dark:border-white/10 text-[10px] uppercase">Lançar Venda <i class="fas fa-dollar-sign text-brand-orange"></i></button>
                    <button onclick="configGoals()" class="w-full flex items-center justify-between p-4 bg-gray-800 text-white font-black rounded-2xl text-[10px] uppercase border border-white/5">Config. Metas <i class="fas fa-bullseye text-brand-orange"></i></button>
                    <button onclick="manageMonths()" class="w-full flex items-center justify-between p-4 bg-gray-700 text-white font-black rounded-2xl text-[10px] uppercase border border-white/5">Config. Meses <i class="fas fa-calendar-alt text-brand-orange"></i></button>

                <div class="space-y-2">
                    <p class="text-[9px] font-black text-gray-400 uppercase px-2 tracking-widest text-black dark:text-white">Opções</p>
                    <button onclick="exportCSV()" class="w-full text-left text-[10px] font-black p-4 hover:bg-brand-orange hover:text-white rounded-2xl transition-all uppercase">Exportar CSV</button>

            <div class="p-6 border-t dark:border-white/5 space-y-3 bg-gray-50 dark:bg-black">

            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 bg-white dark:bg-brand-dark overflow-y-auto main-content">
            <main class="p-4 md:p-10">
                <div class="mb-10 text-black dark:text-white text-black dark:text-white">
                    <h2 class="text-[10px] md:text-[11px] font-black uppercase tracking-widest text-gray-400 mb-6 italic border-l-4 border-brand-orange pl-4">Performance Comercial</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-gray-200 dark:border-white/5 text-center shadow-sm"><p class="text-[9px] font-black text-brand-orange uppercase mb-1">Faturamento Mês</p><h3 id="revTotal" class="text-2xl md:text-3xl font-black tracking-tighter">R$ 0,00</h3></div>
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-gray-200 dark:border-white/5 text-center opacity-70"><p class="text-[9px] font-black uppercase mb-1 text-gray-400">Média Vendas/Dia</p><h3 id="revAvg" class="text-2xl md:text-3xl font-black tracking-tighter text-gray-500">R$ 0,00</h3></div>
                        <div class="bg-gray-50 dark:bg-brand-card p-6 rounded-[35px] border border-brand-orange/20 bg-brand-orange/5 text-center shadow-sm"><p class="text-[9px] font-black text-brand-orange uppercase mb-1">Projeção do Mês</p><h3 id="revProj" class="text-2xl md:text-3xl font-black tracking-tighter text-brand-orange">R$ 0,00</h3></div>
                    </div>

                    <div class="bg-gray-50 dark:bg-brand-card p-6 md:p-8 rounded-[40px] border border-gray-200 dark:border-white/5 mb-8 text-black dark:text-white">
                        <div class="mb-6 flex justify-between items-center">
                            <div><p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Status da Barra:</p><h4 id="barTitle" class="text-lg md:text-xl font-black text-brand-orange italic uppercase">Objetivo Nível 3</h4></div>
                            <span id="barPerc" class="text-2xl font-black text-brand-orange">0%</span>
                        </div>
                        <div class="relative w-full h-8 md:h-10 bg-gray-200 dark:bg-black rounded-full overflow-hidden p-1.5 shadow-inner mb-8"><div id="goalProgressBar" class="h-full bg-brand-orange rounded-full transition-all duration-700 progress-glow" style="width: 0%"></div></div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div id="goalCard1" onclick="setBarFilter(1)" class="goal-card p-5 rounded-[25px] bg-white dark:bg-black/20 border border-gray-200 dark:border-white/5 text-center"><span class="text-[8px] font-black px-2 py-0.5 rounded bg-gray-200 dark:bg-black mb-2 inline-block uppercase">Nível 1</span><h4 id="l1Val" class="text-lg font-black">R$ 0,00</h4><p id="l1Status" class="text-[9px] font-bold text-brand-orange italic uppercase">...</p></div>
                            <div id="goalCard2" onclick="setBarFilter(2)" class="goal-card p-5 rounded-[25px] bg-white dark:bg-black/20 border border-gray-200 dark:border-white/5 text-center"><span class="text-[8px] font-black px-2 py-0.5 rounded bg-gray-200 dark:bg-black mb-2 inline-block uppercase">Nível 2</span><h4 id="l2Val" class="text-lg font-black">R$ 0,00</h4><p id="l2Status" class="text-[9px] font-bold text-brand-orange italic uppercase">...</p></div>
                            <div id="goalCard3" onclick="setBarFilter(3)" class="goal-card p-5 rounded-[25px] border-2 border-brand-orange/20 bg-brand-orange/5 text-center active-filter"><span class="text-[8px] font-black px-2 py-0.5 rounded bg-brand-orange text-white mb-2 inline-block uppercase text-black dark:text-white">Nível 3</span><h4 id="l3Val" class="text-lg font-black text-brand-orange">R$ 0,00</h4><p id="l3Status" class="text-[9px] font-bold text-brand-orange uppercase italic">...</p></div>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-brand-card rounded-[30px] border border-gray-200 dark:border-white/5 overflow-hidden shadow-sm mb-8 text-black dark:text-white">
                        <div class="px-6 py-4 border-b dark:border-white/5 flex flex-col md:flex-row justify-between items-center bg-white/20 dark:bg-black/20 gap-4">
                            <div class="flex items-center gap-3"><span class="text-[9px] font-black uppercase text-gray-400 tracking-widest italic">Período:</span><select id="monthSelector" onchange="changeViewMonth(this.value)" class="bg-white dark:bg-black text-brand-orange text-[10px] font-black px-4 py-2 rounded-xl outline-none border border-brand-orange/20"></select></div>
                            <button onclick="clearAllRevenue()" class="admin-only text-[9px] font-black text-rose-500 uppercase hover:underline">Zerar Mês</button>
                        </div>
                        <div class="max-h-64 overflow-y-auto"><table class="w-full text-[11px] text-left text-black dark:text-white"><tbody id="histTable" class="divide-y dark:divide-white/5 text-black dark:text-white"></tbody></table></div>
                    </div>
                </div>

                <div id="adminBulkArea" class="admin-only bg-brand-orange p-1 rounded-[35px] mb-8 shadow-xl">
                    <div class="bg-white dark:bg-brand-card rounded-[34px] p-6 text-black dark:text-white">
                        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-3">
                            <select id="bulkCategory" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border text-xs font-bold outline-none text-black dark:text-white"><option value="all">Todas Categorias</option><option value="0">Unissex</option><option value="1">Regata</option><option value="2">Infantil</option><option value="3">Plus Size</option><option value="4">M. Careca</option><option value="5">M. Canguru</option></select>
                            <select id="bulkMode" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border text-xs font-bold outline-none text-brand-orange"><option value="val">Preço Final</option><option value="cheio">Valor Cheio</option><option value="perc">Desconto %</option></select>
                            <input type="number" id="bulkValue" step="0.01" class="p-4 rounded-2xl bg-gray-100 dark:bg-black border text-xs font-bold outline-none text-black dark:text-white" placeholder="VALOR">
                            <button onclick="applyBulkUpdate()" class="lg:col-span-2 bg-brand-orange text-white font-black rounded-2xl uppercase text-[10px] py-4 shadow-lg active:scale-95 transition-all">Alterar Massa</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white dark:bg-brand-card rounded-[35px] shadow-2xl border border-gray-200 dark:border-white/5 overflow-x-auto mb-20">
                    <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b dark:border-white/5">
                         <div class="flex flex-wrap gap-2 justify-center">
                            <button onclick="setFilter('')" class="px-4 py-2 bg-gray-100 dark:bg-brand-card rounded-xl text-[9px] font-black uppercase border border-transparent hover:border-brand-orange text-black dark:text-white">Todos</button>
                            <button onclick="setFilter('ML')" class="px-4 py-2 bg-yellow-400 text-black rounded-xl text-[9px] font-black uppercase">ML</button>
                            <button onclick="setFilter('Shopee')" class="px-4 py-2 bg-brand-orange text-white rounded-xl text-[9px] font-black uppercase shadow-lg">Shopee</button>
                            <button onclick="setFilter('TikTok')" class="px-4 py-2 bg-black text-white dark:bg-white dark:text-black rounded-xl text-[9px] font-black uppercase">TikTok</button>
                            <button onclick="setFilter('Shein')" class="px-4 py-2 bg-gray-800 text-white rounded-xl text-[9px] font-black uppercase">Shein</button>
                        </div>
                        <div class="relative w-full lg:w-80"><input type="text" id="globalSearch" oninput="render()" placeholder="BUSCAR CONTA..." class="w-full p-4 pl-12 rounded-2xl bg-gray-100 dark:bg-brand-card border-none text-xs font-bold outline-none focus:ring-2 ring-brand-orange uppercase text-black dark:text-white"><i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i></div>
                    </div>
                    <table class="whitespace-nowrap text-left w-full border-collapse">
                        <thead class="bg-gray-50 dark:bg-black/50 text-[9px] font-black text-gray-400 uppercase tracking-widest border-b dark:border-white/5"><tr id="tableHeadRow"></tr></thead>
                        <tbody id="tableBody" class="divide-y dark:divide-white/5"></tbody>
                    </table>
                </div>

                <div id="historyBlock" class="admin-only bg-gray-100 dark:bg-black text-gray-900 dark:text-white p-8 rounded-[40px] border border-gray-200 dark:border-white/5 mb-32 font-mono overflow-hidden">
                    <div class="flex justify-between items-center mb-6"><p class="text-[10px] font-black text-brand-orange uppercase tracking-widest">Auditoria de Alterações</p><button onclick="db.ref('history').remove()" class="text-[9px] text-gray-400 uppercase hover:text-brand-orange">Limpar Logs</button></div>
                    <ul id="historyList" class="space-y-2 text-[10px] opacity-80 dark:opacity-60"></ul>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfRR0V74GV6Tr9ZxiHUTiDGOg-4HqqHxE",
            authDomain: "valores-mkt.firebaseapp.com",
            databaseURL: "https://valores-mkt-default-rtdb.firebaseio.com", 
            projectId: "valores-mkt",
            storageBucket: "valores-mkt.firebasestorage.app",
            messagingSenderId: "981119124135",
            appId: "1:981119124135:web:f2cbcaf672e6e88991d182"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const PASSWORDS = { admin: "748596", viewer: "convidado" };
        
        let isAdmin = false, accounts = [], historyData = [], selectedIndices = new Set(), revenueData = { daily: {}, total: 0 };
        let goals = { lvl1: 1500000, lvl2: 1650000, lvl3: 2000000 };
        let customMonths = ["2026-03", "2026-04"]; 
        let currentGoalFilter = 3; 
        const now = new Date();
        let selectedMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        function checkSession() {
            const role = localStorage.getItem('mkt_logged');
            const last = localStorage.getItem('mkt_last_activity');
            if (role && last && (Date.now() - parseInt(last) < 7200000)) { enterApp(role); }
        }
        function updateActivity() { localStorage.setItem('mkt_last_activity', Date.now().toString()); }
        ['mousedown', 'keydown', 'touchstart'].forEach(e => window.addEventListener(e, updateActivity));

        function togglePassVisibility() {
            const input = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") { input.type = "text"; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { input.type = "password"; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        function checkPass() {
            const v = document.getElementById('passInput').value.trim();
            if (v === PASSWORDS.admin) { localStorage.setItem('mkt_logged', 'ADMIN'); updateActivity(); enterApp("ADMIN"); }
            else if (v === PASSWORDS.viewer) { localStorage.setItem('mkt_logged', 'CONVIDADO'); updateActivity(); enterApp("CONVIDADO"); }
            else alert("Incorreto");
        }

        function enterApp(m) {
            isAdmin = (m === 'ADMIN');
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userStatus').innerText = m;
            if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            db.ref('monthConfig').on('value', s => { if(s.val()) customMonths = s.val(); renderMonthSelector(); startSync(); });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function logout() { localStorage.clear(); location.reload(); }

        function manageMonths() {
            const action = prompt("ADD para novo mês ou DEL para remover atual:", "ADD");
            if(action === 'ADD') {
                const n = prompt("Formato AAAA-MM:", "2026-05");
                if(n && !customMonths.includes(n)) { customMonths.push(n); customMonths.sort().reverse(); db.ref('monthConfig').set(customMonths); }
            } else if (action === 'DEL') {
                if(confirm("Remover período?")) { customMonths = customMonths.filter(m => m !== selectedMonthKey); db.ref('monthConfig').set(customMonths); }
            }
        }

        function renderMonthSelector() {
            const select = document.getElementById('monthSelector'); select.innerHTML = '';
            customMonths.forEach(m => {
                const [y, mm] = m.split('-'); const d = new Date(y, mm-1, 1);
                const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
                const opt = document.createElement('option'); opt.value = m; opt.innerText = label;
                if(m === selectedMonthKey) opt.selected = true; select.appendChild(opt);
            });
        }

        function changeViewMonth(key) { selectedMonthKey = key; startSync(); }

        function startSync() {
            db.ref('goals').on('value', s => { if(s.val()) goals = s.val(); updateDash(); });
            db.ref(`revenue/${selectedMonthKey}`).on('value', s => { processRevenueData(s.val() || {}); });
            db.ref('accounts').on('value', s => { if(s.val()) { accounts = s.val(); render(); } });
            db.ref('history').limitToLast(30).on('value', snap => { if (snap.val()) { historyData = Object.values(snap.val()).reverse(); renderAuditHistory(); } });
        }

        function processRevenueData(daily) {
            revenueData.daily = daily; let sum = 0;
            Object.values(daily).forEach(v => { let n = parseFloat(String(v).replace('R$', '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.')); if(!isNaN(n)) sum += n; });
            revenueData.total = Math.round(sum * 100) / 100; updateDash(); renderHistTable();
        }

        function renderHistTable() {
            const hTable = document.getElementById('histTable'); if(!hTable) return; hTable.innerHTML = '';
            const logs = revenueData.daily || {};
            Object.keys(logs).sort().reverse().forEach(k => {
                let val = parseFloat(String(logs[k]).replace('R$', '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.'));
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="px-6 py-4 font-bold opacity-50">${k.split('-').reverse().join('/')}</td><td class="px-6 py-4 font-black text-brand-orange text-lg">R$ ${val.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td><td class="px-6 py-4 text-right">${isAdmin ? `<button onclick="deleteDay('${k}')" class="text-rose-500">×</button>` : ''}</td>`;
                hTable.appendChild(tr);
            });
        }

        function deleteDay(k) { if(confirm("Excluir?")) { logAction(`Excluiu venda do dia ${k.split('-').reverse().join('/')}`); db.ref(`revenue/${selectedMonthKey}/${k}`).remove(); } }

        function updateDash() {
            const total = revenueData.total || 0; const count = Object.keys(revenueData.daily || {}).length; const avg = count > 0 ? total / count : 0;
            const [y, m] = selectedMonthKey.split('-'); const daysInMonth = new Date(y, m, 0).getDate();
            document.getElementById('revTotal').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById('revAvg').innerText = `R$ ${avg.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            document.getElementById('revProj').innerText = `R$ ${(avg * daysInMonth).toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            let tV = goals[`lvl${currentGoalFilter}`] || 1; const p = Math.min((total/tV)*100, 100);
            document.getElementById('goalProgressBar').style.width = p + "%"; document.getElementById('barPerc').innerText = Math.round(p) + "%";
            for(let i=1; i<=3; i++) {
                const target = goals[`lvl${i}`]; document.getElementById(`l${i}Val`).innerText = `R$ ${target.toLocaleString('pt-BR')}`;
                const st = document.getElementById(`l${i}Status`);
                if (total >= target) { st.innerText = "Check! ✅"; st.className = "text-[9px] font-black text-emerald-500 uppercase"; }
                else { st.innerText = `Falta R$ ${(target - total).toLocaleString('pt-BR', {minimumFractionDigits:2})}`; st.className = "text-[9px] font-bold text-brand-orange uppercase italic"; }
            }
        }

        function setBarFilter(level) {
            currentGoalFilter = level;
            [1, 2, 3].forEach(i => { const card = document.getElementById(`goalCard${i}`); i === level ? card.classList.add('active-filter') : card.classList.remove('active-filter'); });
            updateDash();
        }

        function render() {
            const head = document.getElementById('tableHeadRow'); const body = document.getElementById('tableBody'); const q = document.getElementById('globalSearch')?.value.toLowerCase() || "";
            head.innerHTML = (isAdmin ? `<th class="px-6 py-6 text-center w-10"><input type="checkbox" onclick="toggleSelectAll(this.checked)"></th>` : '') + `<th class="px-8 py-6 border-r dark:border-white/5">Conta</th><th>Unissex</th><th>Regata</th><th>Infantil</th><th>Plus</th><th>Careca</th><th>Canguru</th>` + (isAdmin ? `<th class="px-8 py-6 text-center">Ações</th>` : '');
            body.innerHTML = '';
            accounts.forEach((acc, idx) => {
                if(q && !acc.n.toLowerCase().includes(q)) return;
                const tr = document.createElement('tr'); tr.className = selectedIndices.has(idx) ? 'bg-brand-orange/5 transition-colors' : '';
                let row = isAdmin ? `<td class="px-6 py-8 text-center"><input type="checkbox" onclick="toggleSelect(${idx})" ${selectedIndices.has(idx)?'checked':''}></td>` : '';
                row += `<td class="px-8 py-8 font-black border-r dark:border-white/5 text-black dark:text-white"><div class="flex items-center text-black dark:text-white">${isAdmin?'<i class="fas fa-grip-vertical handle mr-2 opacity-30"></i>':''}${getIcon(acc.n)} <span ${isAdmin?'contenteditable="true" onblur="upName('+idx+', this.innerText)"':''}>${acc.n}</span></div></td>`;
                acc.v.forEach((v, vi) => {
                    let dV = acc.t === 2 && acc.c[vi] > 0 ? acc.c[vi] * (1 - (acc.p[vi] / 100)) : v;
                    row += `<td class="px-8 py-8 font-mono"><div class="flex flex-col gap-1">
                        ${acc.t===2 && acc.c[vi]>0 ? `<div class="flex flex-col opacity-50 text-[8px]"><span>Cheio: <span ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'cheio\')\"':''}>R$ ${acc.c[vi].toFixed(2)}</span></span></div>` : ''}
                        <div class="flex flex-col"><span class="text-[7px] text-brand-orange font-black uppercase">Final</span><span class="font-black text-sm" ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'val\')\"':''}>R$ ${dV.toFixed(2)}</span></div>
                        ${acc.t===2 && dV>0 ? `<div class="flex flex-col text-[8px] font-black text-brand-orange"><span ${isAdmin?'contenteditable="true" onblur="hSync('+idx+','+vi+',this.innerText,\'perc\')\"':''}>${acc.p[vi].toFixed(1)}% OFF</span></div>` : ''}
                    </div></td>`;
                });
                if(isAdmin) row += `<td class="px-8 py-8 text-center text-black dark:text-white"><button onclick="removeRow(${idx})" class="text-gray-400 hover:text-rose-500">×</button></td>`;
                tr.innerHTML = row; body.appendChild(tr);
            });
            if(isAdmin) initSortable();
            document.getElementById('dashTotal').innerText = accounts.filter(a => !q || a.n.toLowerCase().includes(q)).length;
        }

        // --- SISTEMA DE LOGS DETALHADOS ---
        function logAction(msg) {
            const time = new Date().toLocaleString('pt-BR');
            db.ref('history').push(`[${time}] ${msg}`);
        }

        function applyBulkUpdate() {
            if(!isAdmin) return;
            const cat = document.getElementById('bulkCategory').value;
            const mode = document.getElementById('bulkMode').value;
            const val = parseFloat(document.getElementById('bulkValue').value);
            if (isNaN(val) || selectedIndices.size === 0) { alert("Selecione contas e um valor!"); return; }
            
            const cats = ["Unissex", "Regata", "Infantil", "Plus", "Careca", "Canguru"];
            const catName = cat === 'all' ? "Todas" : cats[parseInt(cat)];
            const modeName = mode === 'val' ? "Preço Final" : (mode === 'cheio' ? "Valor Cheio" : "Desconto %");

            selectedIndices.forEach(idx => {
                let a = accounts[idx];
                const up = (i) => {
                    if (mode === 'val') { a.v[i] = val; if(a.t===2 && a.c[i]>0) a.p[i] = (1-(val/a.c[i]))*100; }
                    else if (mode === 'cheio' && a.t===2) { a.c[i] = val; a.v[i] = val*(1-(a.p[i]/100)); }
                    else if (mode === 'perc' && a.t===2) { a.p[i] = val; a.v[i] = a.c[i]*(1-(val/100)); }
                };
                if (cat === 'all') a.v.forEach((_, i) => up(i)); else up(parseInt(cat));
            });
            
            logAction(`Massa: ${selectedIndices.size} lojas alteradas (${catName} -> ${modeName}: ${val})`);
            selectedIndices.clear();
            db.ref('accounts').set(accounts).then(() => { render(); });
        }

        function hSync(idx, col, input, m) { 
            if(!isAdmin) return; 
            let n = parseFloat(input.replace(/[^\d.,-]/g, '').replace(',', '.')); 
            if (isNaN(n)) return render(); 
            let a = accounts[idx];
            const cats = ["Unissex", "Regata", "Infantil", "Plus", "Careca", "Canguru"];
            const modeLabel = m === 'val' ? "Preço Final" : (m === 'cheio' ? "V. Cheio" : "% OFF");
            
            logAction(`Individual: ${a.n} (${cats[col]}) alterado para ${n} (${modeLabel})`);
            
            if (m === 'val') { a.v[col] = n; if(a.t === 2 && a.c[col]>0) a.p[col] = (1-(n/a.c[col]))*100; } 
            else if (m === 'perc') { a.p[col] = n; if(a.t === 2 && a.c[col]>0) a.v[col] = a.c[col]*(1-(n/100)); } 
            else if (m === 'cheio') { a.c[col] = n; a.v[col] = n*(1-(a.p[col]/100)); } 
            db.ref('accounts').set(accounts); 
        }

        function upName(i, t) { if(!isAdmin) return; const old = accounts[i].n; accounts[i].n = t.trim(); logAction(`Renomeou conta: ${old} -> ${accounts[i].n}`); db.ref('accounts').set(accounts); }
        function addRow() { if(!isAdmin) return; const t = prompt("Tipo 1 ou 2:", "1"); if(t) { accounts.unshift({n:"Nova Loja", t:parseInt(t), c:[60,60,60,60,80,80], p:[40,40,40,40,0,0], v:[0,0,0,0,0,0]}); logAction("Adicionou nova loja"); db.ref('accounts').set(accounts); } }
        function removeRow(i) { if(isAdmin && confirm("Excluir?")) { logAction(`Removeu loja: ${accounts[i].n}`); accounts.splice(i, 1); db.ref('accounts').set(accounts); } }
        function configGoals(){ if(!isAdmin) return; const l1=prompt("Meta 1:", goals.lvl1), l2=prompt("Meta 2:", goals.lvl2), l3=prompt("Meta 3:", goals.lvl3); if(l1) { logAction(`Alterou Metas: L1:${l1}, L2:${l2}, L3:${l3}`); db.ref('goals').set({lvl1:parseFloat(l1), lvl2:parseFloat(l2), lvl3:parseFloat(l3)}); } }
        function inputRevenue(){ 
            if(!isAdmin) return; const d=prompt("Data (DD/MM/AAAA):", new Date().toLocaleDateString()); const v=prompt("Valor:"); 
            if(v){ 
                const p=d.split('/'); const k=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; const mKey=`${p[2]}-${p[1].padStart(2,'0')}`; 
                logAction(`Lançou Venda: R$ ${v} para o dia ${d}`);
                db.ref(`revenue/${mKey}/${k}`).set(v); 
            } 
        }
        function clearAllRevenue() { if(isAdmin && confirm("Zerar mês?")) { logAction(`Limpou todos os lançamentos do mês ${selectedMonthKey}`); db.ref(`revenue/${selectedMonthKey}`).remove(); } }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('mkt_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); }
        function renderAuditHistory() { document.getElementById('historyList').innerHTML = historyData.map(h => `<li class="border-b dark:border-white/5 pb-1 text-black dark:text-white">${h}</li>`).join(''); }
        function toggleSelect(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
        function toggleSelectAll(c) { selectedIndices.clear(); if(c) accounts.forEach((a,i) => selectedIndices.add(i)); render(); }
        function setFilter(v) { document.getElementById('globalSearch').value = v; render(); }
        function initSortable() { if(!isAdmin) return; new Sortable(document.getElementById('tableBody'), { handle: '.handle', onEnd: () => db.ref('accounts').set(accounts) }); }
        function getIcon(n) { 
            const s = n.toLowerCase(); 
            if(s.includes('ml')) return '<i class="fas fa-handshake text-yellow-400 mr-2"></i>'; 
            if(s.includes('shopee')) return '<i class="fas fa-shopping-bag text-brand-orange mr-2"></i>'; 
            if(s.includes('tiktok')) return '<i class="fab fa-tiktok text-black dark:text-white mr-2"></i>'; 
            if(s.includes('shein')) return '<i class="fas fa-shopping-cart text-gray-500 mr-2"></i>'; 
            return '<i class="fas fa-store opacity-20 mr-2"></i>'; 
        }
        function exportCSV() { let csv = "Loja,Unissex,Regata,Infantil,Plus,Careca,Canguru\n"; accounts.forEach(a => csv += `${a.n},${a.v.map(v => v.toFixed(2)).join(",")}\n`); const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Relatorio.csv`; link.click(); }
        function exportPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); doc.autoTable({ head: [['Conta', 'Unissex', 'Regata', 'Infantil', 'Plus', 'Careca', 'Canguru']], body: accounts.map(a => [a.n, ...a.v.map(v => `R$ ${v.toFixed(2)}`)]), styles: { fontSize: 8 } }); doc.save('Relatorio.pdf'); }
        window.onload = checkSession;
    </script>
</body>
</html>
